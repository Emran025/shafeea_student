name: Build All Schools — Student App

# ──────────────────────────────────────────────────────────────────────────────
# Triggered by pushing a version tag to shafeea_student (e.g. v2.1.0).
#
# This workflow runs AFTER the base build-release.yml has already created the
# GitHub Release with the default (unbranded) APK. It then:
#
#   1. Queries the Shafeea Build API for all active schools.
#   2. Generates a dynamic parallel matrix (one job per school).
#   3. Each job runs inside the shared Docker build environment and:
#        a. Downloads the school's logo.
#        b. Applies branding-engine.sh  → patches applicationId & app label.
#        c. Applies generate-icons.sh   → replaces all launcher icon densities.
#        d. Runs build-apk.sh           → produces a signed, school-locked APK.
#        e. Uploads the APK to the existing GitHub Release.
#        f. Notifies the web platform (mark-built + email webhook).
#
# APK naming:  {school_code}-student-v{version}.apk
# ──────────────────────────────────────────────────────────────────────────────

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - 'v[0-9]+.[0-9]+.[0-9]+\+[0-9]+'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build against (e.g. v2.1.0)'
        required: true
        type: string

permissions:
  contents: write   # upload release assets
  packages: read    # pull ghcr.io image

env:
  BUILDER_IMAGE: ghcr.io/emran025/flutter-android-builder:3.44.5
  APP: student

jobs:
  # ── Job 1: Fetch active schools + build the matrix ───────────────────────────
  prepare-matrix:
    name: Fetch Active Schools
    runs-on: ubuntu-latest
    outputs:
      matrix:      ${{ steps.schools.outputs.matrix }}
      has_schools: ${{ steps.schools.outputs.has_schools }}
      release_tag: ${{ steps.tag.outputs.release_tag }}
      build_name:  ${{ steps.tag.outputs.build_name }}
    steps:
      - name: Resolve release tag
        id: tag
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          if [[ "$VERSION" == *"+"* ]]; then
            BUILD_NAME="${VERSION%%+*}"
          else
            BUILD_NAME="${VERSION}"
          fi
          echo "release_tag=${TAG}"   >> "$GITHUB_OUTPUT"
          echo "build_name=${BUILD_NAME}" >> "$GITHUB_OUTPUT"

      - name: Sign Build API request
        id: sign
        env:
          BUILD_API_PRIVATE_KEY: ${{ secrets.BUILD_API_PRIVATE_KEY }}
        run: |
          TIMESTAMP=$(date +%s)
          BODY=""
          BODY_HASH=$(echo -n "${BODY}" | sha256sum | awk '{print $1}')
          PAYLOAD="${TIMESTAMP}.${BODY_HASH}"
          SIGNATURE=$(echo -n "${PAYLOAD}" | \
            openssl dgst -sha256 -sign <(echo "${BUILD_API_PRIVATE_KEY}") | \
            base64 -w 0)
          echo "timestamp=${TIMESTAMP}" >> "$GITHUB_OUTPUT"
          echo "signature=${SIGNATURE}" >> "$GITHUB_OUTPUT"

      - name: Fetch active schools
        id: schools
        env:
          BUILD_API_BASE_URL: ${{ secrets.BUILD_API_BASE_URL }}
        run: |
          RESPONSE=$(curl -fsSL \
            -H "X-Build-Timestamp: ${{ steps.sign.outputs.timestamp }}" \
            -H "X-Build-Signature: ${{ steps.sign.outputs.signature }}" \
            "${BUILD_API_BASE_URL}/api/build/schools?mode=all")

          # Build a flat matrix of schools for this app
          MATRIX=$(echo "${RESPONSE}" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          schools = data.get('data', [])
          items = []
          for s in schools:
              items.append({
                  'school_id':   s['id'],
                  'school_code': s['school_code'],
                  'school_name': s['name'],
                  'logo_url':    s.get('logo_url', ''),
                  'app_key':     s.get('app_key', ''),
                  'school_locked_mode': s.get('school_locked_mode', True),
                  'keystore_file':           s.get('keystore_file', ''),
                  'keystore_store_password': s.get('keystore_store_password', ''),
                  'keystore_key_alias':      s.get('keystore_key_alias', ''),
                  'keystore_key_password':   s.get('keystore_key_password', ''),
              })
          print(json.dumps({'include': items}))
          sys.stderr.write(f'Found {len(items)} schools.\n')
          ")

          COUNT=$(echo "${RESPONSE}" | python3 -c "import json,sys; d=json.load(sys.stdin); print(len(d.get('data', [])))")
          echo "matrix=${MATRIX}" >> "$GITHUB_OUTPUT"
          echo "has_schools=$([[ ${COUNT} -gt 0 ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"

  # ── Job 2: Build one APK per school (parallel, max 10 concurrent) ─────────────
  build-school:
    name: "${{ matrix.school_code }}"
    needs: prepare-matrix
    if: needs.prepare-matrix.outputs.has_schools == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.matrix) }}
      fail-fast: false
      max-parallel: 10

    container:
      image: ghcr.io/emran025/flutter-android-builder:3.44.5
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout Flutter source
        uses: actions/checkout@v4

      - name: Download school logo
        if: matrix.logo_url != ''
        run: |
          mkdir -p /tmp/logos
          curl -fsSL "${{ matrix.logo_url }}" \
            -o "/tmp/logos/${{ matrix.school_code }}.png" || \
            echo "⚠️ Logo download failed — will use default icons."

      - name: Build branded APK — ${{ matrix.school_code }}
        env:
          # School identity
          SCHOOL_CODE: ${{ matrix.school_code }}
          SCHOOL_NAME: ${{ matrix.school_name }}
          SCHOOL_ID:   ${{ matrix.school_id }}
          APP_KEY:     ${{ matrix.app_key }}
          SCHOOL_LOCKED_MODE: ${{ matrix.school_locked_mode }}
          LOGO_PATH:   /tmp/logos/${{ matrix.school_code }}.png
          # Signing
          KEYSTORE_FILE:           ${{ matrix.keystore_file }}
          STORE_PASSWORD:          ${{ matrix.keystore_store_password }}
          KEY_ALIAS:               ${{ matrix.keystore_key_alias }}
          KEY_PASSWORD:            ${{ matrix.keystore_key_password }}
          # API URL
          SHAFEEA_STUDENT_API_URL: ${{ secrets.SHAFEEA_STUDENT_API_URL }}
        run: |
          build-apk.sh \
            student \
            "${{ needs.prepare-matrix.outputs.build_name }}" \
            "${{ github.run_number }}"

      - name: Locate built APK
        id: apk
        run: |
          APK_PATH=$(find build/app/outputs/flutter-apk \
            -name "${{ matrix.school_code }}-student-v*.apk" | head -1)
          echo "path=${APK_PATH}" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "${APK_PATH}")" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact (for release job)
        uses: actions/upload-artifact@v4
        with:
          name: school-student-${{ matrix.school_code }}
          path: ${{ steps.apk.outputs.path }}
          retention-days: 7
          if-no-files-found: error

  # ── Job 3: Attach all school APKs to the GitHub Release ──────────────────────
  attach-to-release:
    name: Attach School APKs to Release
    needs: [prepare-matrix, build-school]
    if: always() && needs.prepare-matrix.outputs.has_schools == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download all school APK artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: school-student-*
          path: dist/
          merge-multiple: true

      - name: Upload all APKs to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-matrix.outputs.release_tag }}
          files: dist/*.apk
          fail_on_unmatched_files: false

  # ── Job 4: Notify web platform for each school ────────────────────────────────
  notify-platform:
    name: Notify & Mark Built
    needs: [prepare-matrix, attach-to-release]
    if: always() && needs.prepare-matrix.outputs.has_schools == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.matrix) }}
      fail-fast: false
    steps:
      - name: Sign and notify web platform
        env:
          BUILD_API_PRIVATE_KEY: ${{ secrets.BUILD_API_PRIVATE_KEY }}
          BUILD_API_BASE_URL:    ${{ secrets.BUILD_API_BASE_URL }}
        run: |
          RELEASE_TAG="${{ needs.prepare-matrix.outputs.release_tag }}"
          APK_NAME="${{ matrix.school_code }}-student-v${{ needs.prepare-matrix.outputs.build_name }}.apk"
          APK_URL="https://github.com/${{ github.repository }}/releases/download/${RELEASE_TAG}/${APK_NAME}"

          sign_and_post() {
            local URL="$1"
            local BODY="$2"
            local TIMESTAMP=$(date +%s)
            local BODY_HASH=$(echo -n "${BODY}" | sha256sum | awk '{print $1}')
            local PAYLOAD="${TIMESTAMP}.${BODY_HASH}"
            local SIGNATURE=$(echo -n "${PAYLOAD}" | \
              openssl dgst -sha256 -sign <(echo "${BUILD_API_PRIVATE_KEY}") | \
              base64 -w 0)
            curl -fsSL -X POST \
              -H "Content-Type: application/json" \
              -H "X-Build-Timestamp: ${TIMESTAMP}" \
              -H "X-Build-Signature: ${SIGNATURE}" \
              -d "${BODY}" "${URL}" || true
          }

          # Mark school as built
          sign_and_post \
            "${BUILD_API_BASE_URL}/api/build/schools/${{ matrix.school_id }}/mark-built" \
            "{\"release\":\"${RELEASE_TAG}\",\"apk_asset\":\"${APK_NAME}\"}"

          # Fire email notification webhook
          sign_and_post \
            "${BUILD_API_BASE_URL}/api/webhooks/build-complete" \
            "{\"school_id\":${{ matrix.school_id }},\"app\":\"student\",\"release\":\"${RELEASE_TAG}\",\"apk_url\":\"${APK_URL}\"}"

  # ── Job 5: Summary ─────────────────────────────────────────────────────────────
  summarize:
    name: Build Summary
    needs: [prepare-matrix, attach-to-release]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Write summary
        run: |
          echo "## 🏷️ White-Label Student Build — ${{ needs.prepare-matrix.outputs.release_tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "All active school APKs have been built and attached to the release." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "🔗 [View Release](https://github.com/${{ github.repository }}/releases/tag/${{ needs.prepare-matrix.outputs.release_tag }})" >> "$GITHUB_STEP_SUMMARY"
